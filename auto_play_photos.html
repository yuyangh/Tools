<!DOCTYPE html>
<!--
  ====================================================================
  📸 本地自动播放壁纸浏览器 (Local Auto-Play Photo Gallery) - 安全选片版
  ====================================================================
  这个单文件网页应用旨在为摄影师和壁纸爱好者提供一个沉浸式的本地照片轮播展示工具。
  非常适合用来回顾和展示您的高质量摄影作品（例如用 70-200 GM2、35-150 或 50 1.4 拍摄的大片）。

  ✨ 核心功能：
  1. 纯本地运行：直接读取本地文件夹中的照片，不上传任何数据，绝对保护隐私。
  2. 智能横竖屏适配：自动识别当前显示器是横屏还是竖屏，并智能筛选图库中对应比例的照片进行播放。
  3. 内存优化：图片切换后自动释放内存 (URL.revokeObjectURL)，支持超长时间播放几十兆的高像素原图而不卡顿。
  4. 屏幕常亮 (Wake Lock)：播放时自动阻止设备进入休眠状态。
  5. 丰富交互：支持自定义播放间隔、完整显示(Contain)或无缝填充(Cover)、随时暂停/播放、快捷全屏。
  6. 历史记录缓存：自动记忆最近播放的 10 个文件夹，下次打开展现为快捷列表，一键点击恢复。
  7. 快捷复制路径：可一键复制当前照片所在的本地相对路径，方便回溯源文件。
  8. 🗑️ 安全选片(移至废纸篓)：一键将废片移至根目录下的 "_废纸篓_Trash" 文件夹，不会永久删除，安全高效！

  💡 使用方法：
  直接在现代浏览器（Chrome/Edge/Safari等）中双击打开此 HTML 文件，点击“选择照片文件夹”或历史记录即可开始沉浸式浏览。
  ====================================================================
-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos Gallery - 摄影师甄选版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; }
        
        /* === 启动与设置层 === */
        #setup-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #111; color: #fff; z-index: 200; transition: opacity 0.5s;
        }
        
        .settings-box {
            margin-top: 25px; display: flex; align-items: center; gap: 15px;
            background: #222; padding: 15px 30px; border-radius: 12px; border: 1px solid #333;
        }

        /* 通用 Select 样式 */
        select {
            padding: 6px 10px; border-radius: 6px; background: #333; color: white;
            border: 1px solid #555; font-size: 14px; outline: none; cursor: pointer;
        }

        .file-upload {
            border: 2px dashed #555; padding: 50px 80px; text-align: center; border-radius: 16px; 
            cursor: pointer; transition: all 0.3s; background: #1a1a1a;
        }
        .file-upload:hover { border-color: #4285f4; background: #222; transform: scale(1.02); }
        input[type="file"] { display: none; }

        /* 历史记录专属样式 */
        #resume-area {
            display: none; border: 2px solid #34a853; padding: 25px 30px; 
            text-align: center; border-radius: 16px; background: #1a1a1a;
            max-width: 400px; width: 100%; box-sizing: border-box;
        }
        #history-list {
            max-height: 220px; overflow-y: auto; margin-top: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            padding-right: 5px;
        }
        /* 滚动条美化 */
        #history-list::-webkit-scrollbar { width: 6px; }
        #history-list::-webkit-scrollbar-track { background: #111; border-radius: 3px; }
        #history-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        #history-list::-webkit-scrollbar-thumb:hover { background: #777; }
        
        /* 列表项卡片样式 */
        .history-item {
            background: #2a2a2a; padding: 12px 15px; border-radius: 8px; 
            cursor: pointer; text-align: left; transition: background 0.2s, border-color 0.2s;
            display: flex; flex-direction: column; gap: 5px; border: 1px solid transparent;
        }
        .history-item:hover { background: #333; border-color: #34a853; }
        .history-item .folder-name { font-weight: bold; font-size: 15px; color: #fff; }
        .history-item .visit-time { font-size: 12px; color: #aaa; }
        
        /* === 顶部状态栏 === */
        #status-bar {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            color: #ddd; font-size: 14px; padding: 15px 20px 40px 20px;
            opacity: 0; transition: opacity 0.5s; 
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box;
        }
        
        #status-bar select, #status-bar button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); 
            color: #fff; font-size: 13px; margin-left: 10px;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: background 0.2s;
        }
        
        #status-bar button:hover, #status-bar select:hover {
            background: rgba(255,255,255,0.25);
        }
        
        /* 独立功能按钮高亮颜色 */
        #copy-path-btn { border-color: #34a853 !important; color: #34a853 !important; }
        #copy-path-btn:hover { background: rgba(52, 168, 83, 0.2) !important; }
        
        #delete-btn { border-color: #ff9800 !important; color: #ff9800 !important; }
        #delete-btn:hover { background: rgba(255, 152, 0, 0.2) !important; }
        
        /* === 舞台 === */
        #stage { width: 100%; height: 100%; position: relative; }
        
        .slide-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; opacity: 0; transition: opacity 1.5s ease-in-out; 
            display: flex; justify-content: center; align-items: center; z-index: 1; 
        }
        
        .slide-img {
            width: 100%; height: 100%; object-fit: contain; 
            image-rendering: -webkit-optimize-contrast;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); transition: object-fit 0.5s ease;
        }

        .slide-wrapper.active { opacity: 1; z-index: 2; }
        
        #loading-text { margin-top: 20px; color: #888; font-size: 14px; font-family: monospace; text-align: center; white-space: pre-wrap; }

        /* === 自定义弹窗样式 === */
        #custom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
            z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #custom-modal.show { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: #222; border: 1px solid #444; padding: 30px 40px; border-radius: 16px;
            text-align: center; color: white; box-shadow: 0 15px 50px rgba(0,0,0,0.6); max-width: 450px;
        }
        .modal-text { margin-top: 0; margin-bottom: 25px; line-height: 1.6; font-size: 16px; white-space: pre-wrap;}
        .modal-btns { display: flex; gap: 15px; justify-content: center; }
        .modal-btn { 
            padding: 10px 24px; border-radius: 8px; cursor: pointer; border: none; 
            font-weight: bold; font-size: 14px; transition: background 0.2s;
        }
        .btn-cancel { background: #444; color: white; }
        .btn-cancel:hover { background: #555; }
        .btn-primary { background: #4285f4; color: white; }
        .btn-primary:hover { background: #3367d6; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #f57c00; }

        /* Toast 提示框 */
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95); color: #fff; padding: 12px 24px;
            border-radius: 8px; font-size: 14px; z-index: 9999;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <!-- === 启动界面 === -->
    <div id="setup-layer">
        <div id="upload-container" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: center;">
            <div class="file-upload" id="upload-area">
                <span style="font-size: 28px; font-weight: 600;">📂 选择新文件夹</span>
                <br><br>
                <span style="color:#888">（将请求读写权限以支持安全删图）</span>
            </div>
            
            <div id="resume-area">
                <span style="font-size: 24px; font-weight: 600; color: #34a853;">🔄 最近播放</span>
                <div id="history-list"></div>
            </div>
        </div>
        <input type="file" id="folderInput" webkitdirectory multiple style="display: none;">

        <div class="settings-box" id="settings-area">
            <label>⏱️ 初始间隔：</label>
            <select id="intervalSelect">
                <option value="3000">3 秒</option>
                <option value="5000">5 秒</option>
                <option value="10000">10 秒</option>
                <option value="15000" selected>15 秒</option>
                <option value="30000">30 秒</option>
                <option value="60000">60 秒</option>
            </select>
        </div>

        <div id="loading-text"></div>
    </div>

    <!-- === 顶部状态栏 === -->
    <div id="status-bar">
        <div id="status-text-container">
            <span id="status-mode">Waiting...</span>
        </div>
        
        <div id="status-controls" style="pointer-events: auto; display: flex; align-items: center;">
            <select id="timeSelect">
                <option value="all" selected>所有时间</option>
                <option value="week">最近一周</option>
                <option value="month">最近一月</option>
                <option value="3months">最近三个月</option>
                <option value="year">最近一年</option>
            </select>

            <select id="orientationSelect">
                <option value="auto" selected>自适应 (Auto)</option>
                <option value="landscape">仅横屏</option>
                <option value="portrait">仅竖屏</option>
                <option value="all">所有照片</option>
            </select>

            <select id="fitSelect">
                <option value="contain" selected>适应完整 (Contain)</option>
                <option value="cover">填充全屏 (Cover)</option>
            </select>

            <select id="liveIntervalSelect">
                <option value="3000">3s</option>
                <option value="5000">5s</option>
                <option value="10000">10s</option>
                <option value="15000">15s</option>
                <option value="30000">30s</option>
                <option value="60000">60s</option>
            </select>
            
            <button id="delete-btn">🗑️ 移至废纸篓</button>
            <button id="copy-path-btn">📋 复制路径</button>
            <button id="play-pause-btn">⏸️ 暂停</button>
            <button id="next-btn">⏭️ 下一张</button>
            <button id="fs-toggle">⛶ 全屏</button>
        </div>
    </div>

    <!-- === 舞台 === -->
    <div id="stage"></div>

    <!-- === 自定义模态弹窗 === -->
    <div id="custom-modal">
        <div class="modal-box">
            <p id="modal-text" class="modal-text"></p>
            <div class="modal-btns">
                <button id="modal-btn-cancel" class="modal-btn btn-cancel">取消</button>
                <button id="modal-btn-ok" class="modal-btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <!-- === Toast 提示 === -->
    <div id="toast"></div>

    <script>
        const SUPPORTED_EXTS = ['jpg', 'jpeg', 'png', 'webp', 'avif']; 
        let slideInterval = 15000;
        let fitMode = 'contain';
        let orientationMode = 'auto';
        let timeFilterMode = 'all'; 
        
        let landscapePhotos = [];
        let portraitPhotos = [];
        let currentQueue = [];
        let isPlaying = false;
        let wakeLock = null;
        let timer = null; 
        let currentPlayingFile = null; 

        // DOM 元素引用
        const input = document.getElementById('folderInput');
        const setupLayer = document.getElementById('setup-layer');
        const loadingText = document.getElementById('loading-text');
        const uploadArea = document.getElementById('upload-area');
        const resumeArea = document.getElementById('resume-area');
        const uploadContainer = document.getElementById('upload-container');
        const settingsArea = document.getElementById('settings-area');
        
        const statusBar = document.getElementById('status-bar');
        const statusModeText = document.getElementById('status-mode');
        const liveIntervalSelect = document.getElementById('liveIntervalSelect');
        const fsToggleBtn = document.getElementById('fs-toggle');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const nextBtn = document.getElementById('next-btn');
        const copyPathBtn = document.getElementById('copy-path-btn'); 
        const deleteBtn = document.getElementById('delete-btn'); 
        const fitSelect = document.getElementById('fitSelect');
        const orientationSelect = document.getElementById('orientationSelect');
        const timeSelect = document.getElementById('timeSelect');
        const stage = document.getElementById('stage');
        const intervalSelect = document.getElementById('intervalSelect');
        const toast = document.getElementById('toast');

        // 自定义弹窗元素
        const customModal = document.getElementById('custom-modal');
        const modalText = document.getElementById('modal-text');
        const modalBtnOk = document.getElementById('modal-btn-ok');
        const modalBtnCancel = document.getElementById('modal-btn-cancel');

        // --- 0. 自定义弹窗逻辑 ---
        let modalConfirmCallback = null;
        let modalCancelCallback = null;

        function showModal(text, type = 'alert', onConfirm = null, onCancel = null) {
            modalText.innerText = text;
            modalConfirmCallback = onConfirm;
            modalCancelCallback = onCancel;
            
            if (type === 'confirm') {
                modalBtnCancel.style.display = 'inline-block';
                modalBtnOk.innerText = '移入废纸篓';
                modalBtnOk.className = 'modal-btn btn-warning';
            } else {
                modalBtnCancel.style.display = 'none';
                modalBtnOk.innerText = '我知道了';
                modalBtnOk.className = 'modal-btn btn-primary';
            }
            
            customModal.classList.add('show');
        }

        function hideModal() {
            customModal.classList.remove('show');
            modalConfirmCallback = null;
            modalCancelCallback = null;
        }

        modalBtnCancel.onclick = () => {
            if (modalCancelCallback) modalCancelCallback();
            hideModal();
        };

        modalBtnOk.onclick = () => {
            if (modalConfirmCallback) modalConfirmCallback();
            hideModal();
        };

        // --- 1. IndexedDB 存储最多10个目录句柄 ---
        const DB_NAME = 'PhotoGalleryDB';
        const STORE_NAME = 'recent_dirs_v2'; 
        const DB_VERSION = 2;
        const MAX_HISTORY = 10;

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'name' }); 
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveDirectoryHandle(handle) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put({ name: handle.name, handle: handle, timestamp: Date.now() });
                
                const getAllReq = store.getAll();
                getAllReq.onsuccess = () => {
                    let records = getAllReq.result;
                    if (records.length > MAX_HISTORY) {
                        records.sort((a, b) => b.timestamp - a.timestamp); 
                        const toDelete = records.slice(MAX_HISTORY); 
                        toDelete.forEach(record => store.delete(record.name));
                    }
                };
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getRecentDirectoryHandles() {
            const db = await initDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => {
                    let records = req.result;
                    records.sort((a, b) => b.timestamp - a.timestamp);
                    resolve(records);
                };
                req.onerror = () => resolve([]);
            });
        }

        // --- 2. 文件夹扫描（屏蔽废纸篓文件夹，并附加根目录句柄） ---
        async function getFilesFromHandle(dirHandle) {
            const files = [];
            loadingText.innerText = `正在扫描文件夹: ${dirHandle.name}，这可能需要几秒钟...`;
            
            async function scan(handle, currentPath) {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file') {
                        const file = await entry.getFile();
                        file.customRelativePath = currentPath + entry.name; 
                        
                        // 记录父级目录、根目录以及真实文件名，供移动到废纸篓使用
                        file.parentHandle = handle; 
                        file.rootHandle = dirHandle; // 新增：保存根目录句柄
                        file.handleName = entry.name; 
                        
                        files.push(file);
                    } else if (entry.kind === 'directory') {
                        // 核心：如果是咱们创建的专属废纸篓，直接跳过扫描，不展示里面的废片！
                        if (entry.name === '_废纸篓_Trash') continue;
                        await scan(entry, currentPath + entry.name + '/'); 
                    }
                }
            }
            await scan(dirHandle, dirHandle.name + '/');
            return files;
        }

        let recentRecords = [];

        window.addEventListener('DOMContentLoaded', async () => {
            if ('showDirectoryPicker' in window) {
                recentRecords = await getRecentDirectoryHandles();
                if (recentRecords && recentRecords.length > 0) {
                    resumeArea.style.display = 'block';
                    const historyList = document.getElementById('history-list');
                    historyList.innerHTML = ''; 
                    
                    recentRecords.forEach((record, index) => {
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        
                        const d = new Date(record.timestamp);
                        const dateStr = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                        
                        item.innerHTML = `
                            <span class="folder-name">📁 ${record.name}</span>
                            <span class="visit-time">最后访问: ${dateStr}</span>
                        `;
                        
                        item.onclick = () => playFromHistory(index);
                        historyList.appendChild(item);
                    });
                }
            }
        });

        async function processSelectedFiles(files) {
            if (files.length === 0) return;

            slideInterval = parseInt(intervalSelect.value);
            liveIntervalSelect.value = slideInterval;
            
            uploadContainer.style.display = 'none';
            settingsArea.style.display = 'none';
            
            const imageFiles = files.filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                return SUPPORTED_EXTS.includes(ext) && !f.name.startsWith('.');
            });

            if (imageFiles.length === 0) {
                showModal("未找到支持的图片格式。", "alert", () => location.reload());
                return;
            }

            loadingText.innerText = `正在读取 ${imageFiles.length} 张图片的元数据...`;
            await analyzeImages(imageFiles);
        }

        async function playFromHistory(selectedIndex) {
            if (selectedIndex === undefined || !recentRecords[selectedIndex]) return;
            
            const record = recentRecords[selectedIndex];
            const savedHandle = record.handle;
            
            try {
                if ((await savedHandle.queryPermission({mode: 'readwrite'})) !== 'granted') {
                    const permission = await savedHandle.requestPermission({mode: 'readwrite'});
                    if (permission !== 'granted') {
                        showModal("未获得读写权限，请重新选择文件夹或允许权限。");
                        return;
                    }
                }
                
                await saveDirectoryHandle(savedHandle);
                const files = await getFilesFromHandle(savedHandle);
                await processSelectedFiles(files);
            } catch (err) {
                showModal("无法读取该历史文件夹，可能已被移动或删除。请选择新文件夹。");
                console.error(err);
            }
        }

        uploadArea.onclick = async () => {
            if ('showDirectoryPicker' in window) {
                try {
                    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    await saveDirectoryHandle(dirHandle); 
                    const files = await getFilesFromHandle(dirHandle);
                    await processSelectedFiles(files);
                } catch (err) {
                    console.log("用户取消了选择或不支持API", err);
                }
            } else {
                input.click(); 
            }
        };

        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            await processSelectedFiles(files);
        };

        async function analyzeImages(files) {
            let processed = 0;
            const batchSize = 20; 

            for (let i = 0; i < files.length; i += batchSize) {
                const batch = files.slice(i, i + batchSize);
                const promises = batch.map(file => {
                    return new Promise(resolve => {
                        const img = new Image();
                        const url = URL.createObjectURL(file);
                        img.src = url;
                        img.onload = () => {
                            if (img.naturalWidth >= img.naturalHeight) landscapePhotos.push(file);
                            else portraitPhotos.push(file);
                            URL.revokeObjectURL(url);
                            resolve();
                        };
                        img.onerror = () => resolve();
                    });
                });
                await Promise.all(promises);
                processed += batch.length;
                if (processed % 50 === 0 || processed >= files.length) {
                    loadingText.innerText = `正在解析... ${Math.min(processed, files.length)} / ${files.length}`;
                    await new Promise(r => setTimeout(r, 0));
                }
            }
            startPlayback();
        }

        async function startPlayback() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log("Wake Lock not supported or denied"); }

            setupLayer.style.opacity = 0;
            setTimeout(() => setupLayer.style.display = 'none', 500);
            
            isPlaying = true;
            updatePhotoQueue();
            nextSlide();
            
            startTimer();
        }

        function startTimer() {
            if (timer) clearInterval(timer);
            if (isPlaying) {
                timer = setInterval(nextSlide, slideInterval);
            }
        }

        // --- 3. 各种控件逻辑 ---
        liveIntervalSelect.onchange = (e) => { slideInterval = parseInt(e.target.value); startTimer(); };
        fitSelect.onchange = (e) => {
            fitMode = e.target.value;
            document.querySelectorAll('.slide-img').forEach(img => img.style.objectFit = fitMode);
        };
        orientationSelect.onchange = (e) => { orientationMode = e.target.value; updatePhotoQueue(); nextSlide(); if (isPlaying) startTimer(); };
        timeSelect.onchange = (e) => { timeFilterMode = e.target.value; updatePhotoQueue(); nextSlide(); if (isPlaying) startTimer(); };

        playPauseBtn.onclick = () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playPauseBtn.innerText = "⏸️ 暂停";
                startTimer();
            } else {
                playPauseBtn.innerText = "▶️ 播放";
                if (timer) clearInterval(timer);
            }
        };

        nextBtn.onclick = () => { nextSlide(); if (isPlaying) startTimer(); };
        fsToggleBtn.onclick = () => { toggleFullscreen(); };
        document.ondblclick = () => { toggleFullscreen(); };

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
                else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
                fsToggleBtn.innerText = "⛶ 退出";
            } else {
                if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                fsToggleBtn.innerText = "⛶ 全屏";
            }
        }
        
        document.addEventListener('fullscreenchange', () => {
            fsToggleBtn.innerText = document.fullscreenElement ? "⛶ 退出" : "⛶ 全屏";
        });

        function updatePhotoQueue() {
            const isLandscapeScreen = window.innerWidth >= window.innerHeight;
            let baseQueue = [];
            let orientationText = "";

            if (orientationMode === 'auto') {
                if (isLandscapeScreen) { baseQueue = landscapePhotos; orientationText = "🟢 自适应:横屏"; } 
                else { baseQueue = portraitPhotos; orientationText = "🟣 自适应:竖屏"; }
            } else if (orientationMode === 'landscape') { baseQueue = landscapePhotos; orientationText = "🟢 仅横屏"; } 
            else if (orientationMode === 'portrait') { baseQueue = portraitPhotos; orientationText = "🟣 仅竖屏"; } 
            else if (orientationMode === 'all') { baseQueue = [...landscapePhotos, ...portraitPhotos]; orientationText = "🔵 所有方向"; }

            let timeText = "所有时间";
            let cutoffTime = 0;
            
            if (timeFilterMode !== 'all') {
                const d = new Date();
                if (timeFilterMode === 'week') { d.setDate(d.getDate() - 7); timeText = "最近一周"; }
                else if (timeFilterMode === 'month') { d.setMonth(d.getMonth() - 1); timeText = "最近一月"; }
                else if (timeFilterMode === '3months') { d.setMonth(d.getMonth() - 3); timeText = "最近三月"; }
                else if (timeFilterMode === 'year') { d.setFullYear(d.getFullYear() - 1); timeText = "最近一年"; }
                cutoffTime = d.getTime();
            }

            if (cutoffTime > 0) currentQueue = baseQueue.filter(file => file.lastModified >= cutoffTime);
            else currentQueue = baseQueue;

            let modeText = `${orientationText} | ${timeText} | 图库: ${currentQueue.length} 张`;

            if (currentQueue.length === 0) {
                currentQueue = [...landscapePhotos, ...portraitPhotos];
                if (currentQueue.length > 0) modeText += " (无符合条件，已混播)";
            }
            
            statusModeText.innerText = modeText;
        }
        
        window.addEventListener('resize', () => { if (orientationMode === 'auto') updatePhotoQueue(); });

        function nextSlide() {
            if (currentQueue.length === 0) {
                showToast("⚠️ 当前图库已空");
                return;
            }
            const file = currentQueue[Math.floor(Math.random() * currentQueue.length)];
            currentPlayingFile = file; 
            
            const wrapper = document.createElement('div');
            wrapper.className = 'slide-wrapper';
            
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.className = 'slide-img';
            img.style.objectFit = fitMode; 
            
            img.onload = () => {
                wrapper.appendChild(img);
                stage.appendChild(wrapper);
                
                requestAnimationFrame(() => wrapper.classList.add('active'));

                const oldWrappers = document.querySelectorAll('.slide-wrapper');
                if (oldWrappers.length > 2) {
                    const toRemove = oldWrappers[0];
                    toRemove.classList.remove('active'); 
                    setTimeout(() => {
                        if (toRemove.parentNode) {
                            stage.removeChild(toRemove);
                            const imgInside = toRemove.querySelector('img');
                            if (imgInside) URL.revokeObjectURL(imgInside.src);
                        }
                    }, 1500); 
                }
            };
        }

        // --- 4. 安全移至自建废纸篓功能 (替代直接物理删除) ---
        deleteBtn.onclick = () => {
            if (!currentPlayingFile) return;

            // 检查当前模式是否支持 API
            if (!currentPlayingFile.parentHandle || !currentPlayingFile.rootHandle) {
                showModal('当前模式不支持移至废纸篓。请通过“选择新文件夹”或历史记录加载，并授予修改权限。', 'alert');
                return;
            }

            // 操作前先暂停播放
            const wasPlaying = isPlaying;
            if (isPlaying) playPauseBtn.click(); 

            showModal(
                `确定要把这张不满意照片移入废纸篓吗？\n\n📄 ${currentPlayingFile.name}\n\n💡 照片将被移动到图库根目录的 "_废纸篓_Trash" 文件夹中，下次扫描将自动屏蔽它，不会永久丢失。`, 
                'confirm', 
                async () => {
                    try {
                        const rootHandle = currentPlayingFile.rootHandle;
                        
                        // 1. 获取或创建废纸篓文件夹
                        const trashHandle = await rootHandle.getDirectoryHandle('_废纸篓_Trash', { create: true });
                        
                        // 2. 为了防止同名文件（比如两个子文件夹里都有 DSC001.JPG）冲突，加个时间戳前缀
                        const safeFileName = Date.now() + ' ' + currentPlayingFile.handleName;
                        
                        // 3. 在废纸篓里创建一个新文件
                        const newFileHandle = await trashHandle.getFileHandle(safeFileName, { create: true });
                        const writable = await newFileHandle.createWritable();
                        
                        // 4. 把当前文件的内容写入废纸篓的新文件里 (currentPlayingFile 本质上是个 Blob/File 对象)
                        await writable.write(currentPlayingFile);
                        await writable.close();

                        // 5. 复制完成后，从原目录物理删除源文件
                        await currentPlayingFile.parentHandle.removeEntry(currentPlayingFile.handleName);
                        
                        // 从内存中的三大数组清理掉这张图
                        landscapePhotos = landscapePhotos.filter(f => f !== currentPlayingFile);
                        portraitPhotos = portraitPhotos.filter(f => f !== currentPlayingFile);
                        currentQueue = currentQueue.filter(f => f !== currentPlayingFile);
                        
                        showToast(`🗑️ 已安全移至 _废纸篓_Trash: ${currentPlayingFile.name}`);
                        
                        updatePhotoQueue(); // 刷新右上角数量统计
                        nextSlide(); // 立刻切到下一张
                        
                        if (wasPlaying && !isPlaying) playPauseBtn.click();

                    } catch (e) {
                        console.error("移动至废纸篓失败:", e);
                        showModal('操作失败！可能是由于您未授予"编辑"权限，或者该照片正被其他程序占用。');
                        if (wasPlaying && !isPlaying) playPauseBtn.click();
                    }
                },
                () => {
                    // 取消：恢复播放
                    if (wasPlaying && !isPlaying) playPauseBtn.click();
                }
            );
        };

        // --- Toast 提示功能 ---
        let toastTimer;
        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        copyPathBtn.onclick = () => {
            if (!currentPlayingFile) return;
            const pathToCopy = currentPlayingFile.customRelativePath || currentPlayingFile.webkitRelativePath || currentPlayingFile.name;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(pathToCopy).then(() => showToast(`📸 已复制: ${pathToCopy}`))
                .catch(() => fallbackCopyTextToClipboard(pathToCopy));
            } else fallbackCopyTextToClipboard(pathToCopy);
        };

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(`📸 已复制: ${text}`);
            } catch (err) { showToast(`⚠️ 复制失败，请检查浏览器权限设置`); }
            document.body.removeChild(textArea);
        }

        // 鼠标交互：状态栏显隐
        let idleTimer;
        document.onmousemove = () => {
            statusBar.style.opacity = 1;
            document.body.style.cursor = 'default';
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                if (customModal.classList.contains('show')) return; // 弹窗时保持显示
                statusBar.style.opacity = 0;
                document.body.style.cursor = 'none';
            }, 2500);
        };
    </script>
</body>
</html>
